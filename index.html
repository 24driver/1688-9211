<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>무료 상담 랜딩</title>

<style>
body {
  margin: 0;
  font-family: 'Arial', sans-serif;
  background: #f5f5f5;
}

/* 상단 바 */
.top-bar {
  background: #111;
  color: #fff;
  text-align: center;
  padding: 10px;
  font-size: 18px;
}

/* 메인 영역 */
.hero {
  text-align: center;
  background: #fff;
  padding: 30px 20px;
}

.hero img {
  width: 100%;
  max-width: 500px;
  border-radius: 10px;
}

/* 강조 텍스트 */
.title {
  font-size: 28px;
  font-weight: bold;
  margin: 20px 0;
}

.subtitle {
  font-size: 18px;
  color: #666;
}

/* 전화 버튼 */
.call-btn {
  display: block;
  width: 90%;
  max-width: 400px;
  margin: 20px auto;
  padding: 18px;
  font-size: 22px;
  background: red;
  color: #fff;
  text-decoration: none;
  border-radius: 12px;
  font-weight: bold;
}

/* 보조 버튼 */
.sub-btn {
  display: block;
  width: 90%;
  max-width: 400px;
  margin: 10px auto;
  padding: 15px;
  font-size: 18px;
  background: #333;
  color: #fff;
  text-decoration: none;
  border-radius: 10px;
}

/* 후기 영역 */
.review {
  background: #fff;
  margin: 20px;
  padding: 20px;
  border-radius: 10px;
}

.review h3 {
  margin-bottom: 10px;
}

/* 하단 */
.footer {
  text-align: center;
  font-size: 14px;
  color: #999;
  padding: 20px;
}
</style>
</head>

<body>

<!-- 상단 -->
<div class="top-bar">
  📞 24시간 무료 상담: 1644-2580
</div>

<!-- 메인 -->
<div class="hero">
  <div class="title">지금 바로 상담받으세요</div>
  <div class="subtitle">빠르고 정확하게 해결해드립니다</div>

  <img src="images/banner.jpg" alt="배너">

  <!-- 전화 버튼 -->
  <a href="tel:16442580" class="call-btn">
    📞 무료 전화 상담하기
  </a>

  <a href="tel:16442580" class="sub-btn">
    📲 빠른 연결
  </a>
</div>

<!-- 후기 -->
<div class="review">
  <h3>고객 후기</h3>
  <p>✔ 상담이 정말 빨라서 좋았습니다.</p>
  <p>✔ 친절하고 정확한 안내 감사합니다.</p>
  <p>✔ 문제를 바로 해결해줬어요!</p>
</div>

<!-- CTA 반복 -->
<a href="tel:16442580" class="call-btn">
  📞 지금 바로 전화하기
</a>

<!-- 하단 -->
<div class="footer">
  사업자 정보 | 개인정보처리방침<br>
  © 2026 All rights reserved.
</div>

</body>
</html>
